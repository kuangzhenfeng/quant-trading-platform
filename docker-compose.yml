services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=quant
      - POSTGRES_DB=quant_trading
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "127.0.0.1:9000:9000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=9000
      - DATABASE_URL=postgresql+asyncpg://postgres:quant@db:5432/quant_trading
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
