services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=quant
      - POSTGRES_DB=quant_trading
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: ghcr.io/REPO_PATH/backend:IMAGE_TAG
    ports:
      - "9000:9000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=9000
      - DATABASE_URL=postgresql+asyncpg://postgres:quant@db:5432/quant_trading
      - ACCOUNTS_IMPORT_FILE=/app/accounts_import.json
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/accounts_import.json:/app/accounts_import.json:ro
    depends_on:
      - db

  frontend:
    image: ghcr.io/REPO_PATH/frontend:IMAGE_TAG
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
