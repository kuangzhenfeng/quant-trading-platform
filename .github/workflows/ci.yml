name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
      - name: Run tests
        working-directory: ./backend
        run: pytest
        env:
          DATABASE_URL: sqlite+aiosqlite:///./quant_trading_test.db

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        working-directory: ./frontend
        run: npm install
      - name: Type check
        working-directory: ./frontend
        run: npx tsc --noEmit || true
      - name: Lint
        working-directory: ./frontend
        run: npm run lint || true
