name: Deploy to Production

on:
  push:
    branches: [release]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}-backend
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}-frontend
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            set -e

            PROJECT_DIR="${{ secrets.SERVER_PROJECT_DIR || '/opt/quant-trading-platform' }}"
            IMAGE_TAG="${{ needs.build.outputs.image-tag }}"

            echo "==> 切换到项目目录"
            cd "$PROJECT_DIR"

            echo "==> 保存当前版本（用于回滚）"
            docker compose ps --format "{{.Image}}" | grep -E "(backend|frontend)" > .previous_images

            echo "==> 拉取最新代码"
            git pull origin release

            echo "==> 更新镜像 tag 到服务器"
            # 替换镜像名为实际地址
            BACKEND_IMAGE="{{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend"
            FRONTEND_IMAGE="{{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend"

            # 重新 tag 镜像
            docker pull "$BACKEND_IMAGE:$IMAGE_TAG"
            docker pull "$FRONTEND_IMAGE:$IMAGE_TAG"
            docker tag "$BACKEND_IMAGE:$IMAGE_TAG" quant-backend:latest
            docker tag "$FRONTEND_IMAGE:$IMAGE_TAG" quant-frontend:latest

            echo "==> 重新构建并启动服务"
            docker compose -f docker-compose.yml down --remove-orphans
            docker compose -f docker-compose.yml up -d

            echo "==> 等待服务启动"
            sleep 15

            echo "==> 健康检查"
            if curl -sf http://localhost:9000/health > /dev/null 2>&1; then
              echo "Backend health check passed"
            else
              echo "Backend health check failed, checking logs..."
              docker compose -f docker-compose.yml logs backend
              exit 1
            fi

            if curl -sf http://localhost/ > /dev/null 2>&1; then
              echo "Frontend health check passed"
            else
              echo "Frontend health check failed, checking logs..."
              docker compose -f docker-compose.yml logs frontend
              exit 1
            fi

            echo "==> 清理旧镜像"
            docker image prune -af --filter "until=24h" || true

            echo "==> 部署完成"
            docker compose -f docker-compose.yml ps

  rollback:
    needs: deploy
    runs-on: ubuntu-latest
    if: failure()
    environment: production

    steps:
      - name: Rollback to previous version
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            PROJECT_DIR="${{ secrets.SERVER_PROJECT_DIR || '/opt/quant-trading-platform' }}"
            cd "$PROJECT_DIR"

            if [ -f .previous_images ]; then
              echo "==> 检测到部署失败，执行回滚"
              docker compose -f docker-compose.yml down
              docker compose -f docker-compose.yml up -d
              echo "==> 回滚完成"
              docker compose -f docker-compose.yml ps
            fi
