name: Deploy to Production

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract repository owner and name
        id: repo
        run: |
          echo "owner=$(echo '${{ github.repository }}' | cut -d'/' -f1)" >> $GITHUB_OUTPUT
          echo "name=$(echo '${{ github.repository }}' | cut -d'/' -f2)" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.owner }}/${{ steps.repo.outputs.name }}/backend:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.owner }}/${{ steps.repo.outputs.name }}/backend:${{ github.ref_name }}
            ghcr.io/${{ steps.repo.outputs.owner }}/${{ steps.repo.outputs.name }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.owner }}/${{ steps.repo.outputs.name }}/frontend:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.owner }}/${{ steps.repo.outputs.name }}/frontend:${{ github.ref_name }}
            ghcr.io/${{ steps.repo.outputs.owner }}/${{ steps.repo.outputs.name }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    environment: production

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            set -e

            REPO_OWNER="${{ github.repository_owner }}"
            REPO_NAME="${{ github.event.repository.name }}"
            REGISTRY="ghcr.io/${REPO_OWNER}/${REPO_NAME}"
            IMAGE_TAG="${{ github.sha }}"

            echo "==> 切换到项目目录"
            cd "${{ secrets.SERVER_PROJECT_DIR || '/opt/quant-trading-platform' }}"

            echo "==> 更新环境变量配置"
            cat > .env << 'ENVEOF'
            REGISTRY=ghcr.io/kuangzhenfeng/quant-trading-platform
            IMAGE_TAG={{ github.sha }}
            ENVEOF
            # 替换占位符为实际值
            sed -i "s/{{ github.sha }}/$IMAGE_TAG/g" .env

            echo "==> 拉取最新代码"
            git pull origin main

            echo "==> 登录 Container Registry"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "==> 拉取最新镜像"
            docker pull "${REGISTRY}/backend:${IMAGE_TAG}"
            docker pull "${REGISTRY}/frontend:${IMAGE_TAG}"

            echo "==> 重启服务"
            docker compose -f docker-compose.prod.yml --env-file .env up -d

            echo "==> 等待服务启动"
            sleep 20

            echo "==> 健康检查"
            for i in $(seq 1 30); do
              if curl -sf http://localhost:9000/health > /dev/null 2>&1; then
                echo "Backend health check passed"
                break
              fi
              echo "等待后端启动... ($i/30)"
              sleep 2
            done

            if ! curl -sf http://localhost:9000/health > /dev/null 2>&1; then
              echo "Backend health check failed"
              docker compose -f docker-compose.prod.yml --env-file .env logs backend | tail -50
              exit 1
            fi

            if ! curl -sf http://localhost/ > /dev/null 2>&1; then
              echo "Frontend health check failed"
              docker compose -f docker-compose.prod.yml --env-file .env logs frontend | tail -50
              exit 1
            fi

            echo "==> 清理旧镜像"
            docker image prune -af --filter "until=24h" || true

            echo "==> 部署完成"
            docker compose -f docker-compose.prod.yml --env-file .env ps

  rollback:
    needs: deploy
    runs-on: ubuntu-latest
    if: failure()
    permissions:
      contents: read
      packages: read
    environment: production

    steps:
      - name: Rollback
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            set -e

            REPO_OWNER="${{ github.repository_owner }}"
            REPO_NAME="${{ github.event.repository.name }}"
            REGISTRY="ghcr.io/${REPO_OWNER}/${REPO_NAME}"
            IMAGE_TAG="${{ github.sha }}"

            echo "==> 检测到部署失败，执行回滚"
            PROJECT_DIR="${{ secrets.SERVER_PROJECT_DIR || '/opt/quant-trading-platform' }}"
            cd "$PROJECT_DIR"

            echo "==> 登录 Container Registry"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "==> 更新环境变量"
            cat > .env << 'ENVEOF'
            REGISTRY=ghcr.io/kuangzhenfeng/quant-trading-platform
            IMAGE_TAG={{ github.sha }}
            ENVEOF
            sed -i "s/{{ github.sha }}/$IMAGE_TAG/g" .env

            echo "==> 拉取镜像"
            docker pull "${REGISTRY}/backend:${IMAGE_TAG}"
            docker pull "${REGISTRY}/frontend:${IMAGE_TAG}"

            echo "==> 重启服务"
            docker compose -f docker-compose.prod.yml --env-file .env down
            docker compose -f docker-compose.prod.yml --env-file .env up -d
            echo "==> 回滚完成"
            docker compose -f docker-compose.prod.yml --env-file .env ps
