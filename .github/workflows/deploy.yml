name: Deploy to Production

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-backend:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-frontend:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    environment: production

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            set -e

            PROJECT_DIR="${{ secrets.SERVER_PROJECT_DIR || '/opt/quant-trading-platform' }}"
            REGISTRY="ghcr.io/${{ github.repository }}"
            BACKEND_IMAGE="${REGISTRY}-backend"
            FRONTEND_IMAGE="${REGISTRY}-frontend"
            IMAGE_TAG="${{ github.ref_name }}"

            echo "==> 切换到项目目录"
            cd "$PROJECT_DIR"

            echo "==> 拉取最新代码"
            git pull origin main

            echo "==> 登录 Container Registry"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "==> 拉取最新镜像"
            docker pull "$BACKEND_IMAGE:$IMAGE_TAG"
            docker pull "$FRONTEND_IMAGE:$IMAGE_TAG"

            echo "==> 重启服务"
            docker compose -f docker-compose.yml down
            docker compose -f docker-compose.yml up -d

            echo "==> 等待服务启动"
            sleep 20

            echo "==> 健康检查"
            for i in $(seq 1 30); do
              if curl -sf http://localhost:9000/health > /dev/null 2>&1; then
                echo "Backend health check passed"
                break
              fi
              echo "等待后端启动... ($i/30)"
              sleep 2
            done

            if ! curl -sf http://localhost:9000/health > /dev/null 2>&1; then
              echo "Backend health check failed"
              docker compose -f docker-compose.yml logs backend | tail -50
              exit 1
            fi

            if ! curl -sf http://localhost/ > /dev/null 2>&1; then
              echo "Frontend health check failed"
              docker compose -f docker-compose.yml logs frontend | tail -50
              exit 1
            fi

            echo "==> 清理旧镜像"
            docker image prune -af --filter "until=24h" || true

            echo "==> 部署完成"
            docker compose -f docker-compose.yml ps

  rollback:
    needs: deploy
    runs-on: ubuntu-latest
    if: failure()
    permissions:
      contents: read
    environment: production

    steps:
      - name: Rollback
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            PROJECT_DIR="${{ secrets.SERVER_PROJECT_DIR || '/opt/quant-trading-platform' }}"
            cd "$PROJECT_DIR"
            echo "==> 检测到部署失败，执行回滚"
            docker compose -f docker-compose.yml down
            docker compose -f docker-compose.yml up -d
            echo "==> 回滚完成"
            docker compose -f docker-compose.yml ps
